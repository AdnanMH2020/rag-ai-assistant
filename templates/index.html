<!DOCTYPE html>
<html>
<head>
    <title>AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white h-screen flex justify-center items-center">

<div class="w-full max-w-3xl h-[90vh] flex flex-col bg-gray-800 rounded-xl shadow-lg">

    <!-- Header -->
    <div class="p-4 border-b border-gray-700 text-center font-bold text-lg">
        AI Assistant
    </div>

    <!-- Chatbox -->
    <div id="chatbox" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="text-gray-400 text-sm">Upload a PDF and ask questions...</div>
    </div>

    <!-- Upload -->
    <div class="p-3 border-t border-gray-700 flex gap-2">
        <input type="file" id="fileInput" class="text-sm text-gray-300">
        <button onclick="uploadFile()" class="bg-purple-600 px-3 py-1 rounded hover:bg-purple-700">
            Upload
        </button>
    </div>

    <!-- Input -->
    <div class="p-4 border-t border-gray-700 flex gap-2">
        <input id="userInput"
               class="flex-1 p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none"
               placeholder="Ask a question...">
        <button onclick="sendRequest()"
                class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-700">
            Ask
        </button>
    </div>

    <!-- Timer -->
    <div id="timer" class="text-xs text-gray-400 text-center pb-2"></div>

</div>

<script>
async function uploadFile() {
    const fileInput = document.getElementById("fileInput");
    const formData = new FormData();

    formData.append("file", fileInput.files[0]);

    const res = await fetch("/upload", {
        method: "POST",
        body: formData
    });

    const data = await res.json();
    alert(data.message);
}

async function sendRequest() {
    const input = document.getElementById('userInput');
    const chat = document.getElementById('chatbox');
    const timer = document.getElementById('timer');

    const question = input.value;
    input.value = "";

    // User bubble
    chat.innerHTML += `
        <div class="flex justify-end">
            <div class="bg-blue-600 px-4 py-2 rounded-lg max-w-xs">
                ${question}
            </div>
        </div>
    `;

    // Loading bubble
    const loadingId = "loading-" + Date.now();
    chat.innerHTML += `
        <div id="${loadingId}" class="flex justify-start">
            <div class="bg-gray-700 px-4 py-2 rounded-lg max-w-xs animate-pulse">
                Thinking...
            </div>
        </div>
    `;

    chat.scrollTop = chat.scrollHeight;

    // API call
    const response = await fetch('/ask', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ question })
    });

    const data = await response.json();

    // Remove loading
    document.getElementById(loadingId).remove();

    // AI bubble
    chat.innerHTML += `
        <div class="flex justify-start">
            <div class="bg-gray-700 px-4 py-2 rounded-lg max-w-xs">
                ${data.answer}
            </div>
        </div>
    `;

    timer.innerText = `⏱ ${data.latency_seconds}s`;
    chat.scrollTop = chat.scrollHeight;
}

window.onload = function () {
    document.getElementById("userInput").addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            sendRequest();
        }
    });
};
</script>

</body>
</html>
